<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'myapp/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>

        <form method="POST">
            {% csrf_token %}
            <div class="form-field">
                <label for="name">Name</label>
                <input type="text" id="name" name="taskname" placeholder="Enter name" required>
            </div>

            <div class="form-field">
                <label for="date">Date</label>
                <input type="date" id="date" name="taskdate" required>
            </div>

            <button type="submit">Add Task</button>
        </form>

        <div class="task-list">
            {% for i in item %}
                <div class="task-card">
                    <p>{{ i.taskname }}</p>
                    <p>{{ i.taskdate }}</p>

                    <div class="actions">
                        <a class="button button-secondary" href="{% url 'update' i.id %}">Update</a>
                        <a class="button button-danger" href="{% url 'delete' i.id %}">Delete</a>
                    </div>
                </div>
            {% empty %}
                <p class="empty-state">No tasks yet. Add one above.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
